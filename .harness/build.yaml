# Build image Docker du web-flasher (nginx statique, Kaniko).
# Prérequis : pullrepo_github.
#
# REGISTRY_HOST doit être l'URL publique du registry Harness (FQDN sans schéma)
# car le registry retourne un www-authenticate pointant vers ce FQDN.
# Ne pas utiliser l'IP interne ici — Kaniko résoudrait le token endpoint en 404.
kind: pipeline
spec:
  stages:
    - name: build_flasher
      type: ci
      spec:
        cloneCodebase: true
        steps:
          - name: push_flasher
            type: run
            spec:
              container: gcr.io/kaniko-project/executor:debug
              shell: Sh
              envs:
                REGISTRY_PASSWORD: ${{ secrets.get('harness_token') }}
                REGISTRY_USER:     ${{ secrets.get('harness_user') }}
                # FQDN public du registry Harness (même hôte que harness.vincz.fr).
                # Le registry interne (192.168.200.45:3000) délègue son auth Bearer
                # à harness.vincz.fr — Kaniko doit donc s'authentifier sur le FQDN.
                REGISTRY_HOST:     "harness.vincz.fr"
                IMAGE_BASE:        "vincent/esp32_netanalyser"
              script: |-
                set -eu
                if [ -d /gitness ]; then cd /gitness; elif [ -d /harness ]; then cd /harness; else echo "ERREUR: ni /gitness ni /harness" >&2; exit 1; fi
                echo "==> web-flasher (nginx statique)"
                mkdir -p /kaniko/.docker

                # Encoder les credentials en base64 pour le format "auth" Docker
                # (évite que Kaniko tente le flow Bearer token séparément).
                AUTH_B64=$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')
                printf '{"auths":{"%s":{"auth":"%s"}}}\n' "${REGISTRY_HOST}" "${AUTH_B64}" \
                  > /kaniko/.docker/config.json

                /kaniko/executor \
                  --skip-tls-verify \
                  --context=dir://. \
                  --dockerfile=web-flasher/Dockerfile \
                  --destination=$REGISTRY_HOST/$IMAGE_BASE/flasher:latest
                echo "==> Terminé : $REGISTRY_HOST/$IMAGE_BASE/flasher:latest"
          - name: redeploy_portainer
            type: run
            spec:
              container: alpine/curl
              shell: Sh
              envs:
                PORTAINER_URL:      "https://192.168.200.4:9443"
                PORTAINER_TOKEN:    ${{ secrets.get('portainer_token') }}
                PORTAINER_STACK_ID: "STACK_ID"    # ← à remplacer
                ENDPOINT_ID:        "ENDPOINT_ID" # ← à remplacer
              script: |-
                set -eu
                if [ -d /gitness ]; then cd /gitness; elif [ -d /harness ]; then cd /harness; else echo "ERREUR: ni /gitness ni /harness" >&2; exit 1; fi
                apk add -q jq

                echo "==> Récupération des env vars du stack ${PORTAINER_STACK_ID}..."
                STACK_INFO=$(curl -sk -H "X-API-Key: ${PORTAINER_TOKEN}" \
                  "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}")
                ENV_JSON=$(printf '%s' "$STACK_INFO" | jq -c '.Env // []')
                echo "==> Env: $ENV_JSON"

                echo "==> Construction du payload..."
                COMPOSE_JSON=$(jq -Rs . < docker-compose.prod.yml)
                PAYLOAD=$(jq -n \
                  --argjson content "$COMPOSE_JSON" \
                  --argjson env "$ENV_JSON" \
                  '{stackFileContent: $content, env: $env, prune: false, pullImage: true}')

                echo "==> Redéploiement du stack..."
                RESULT=$(curl -sk -X PUT \
                  -H "X-API-Key: ${PORTAINER_TOKEN}" \
                  -H "Content-Type: application/json" \
                  "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID}?endpointId=${ENDPOINT_ID}" \
                  -d "$PAYLOAD")
                echo "==> Résultat: $RESULT"
                printf '%s' "$RESULT" | jq -e '.Id' > /dev/null && echo "==> SUCCESS" || { echo "==> ERREUR redeploy"; exit 1; }
